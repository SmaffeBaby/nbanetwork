# 🔹 Настройка кеша для внешнего API
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=NBA_CACHE:50m inactive=30m max_size=200m;

proxy_cache_path /var/cache/nginx/player_images
    levels=1:2
    keys_zone=PLAYER_IMG_CACHE:100m
    max_size=2g
    inactive=30d
    use_temp_path=off;

server {
    listen 80;
    server_name localhost;
    client_max_body_size 40m;
    error_page 413 = @payload_too_large;

    root /usr/share/nginx/html;
    index index.html;

    location @payload_too_large {
        default_type application/json;
        return 413 '{"error":"Изображение слишком большое. Выберите файл меньше 5 МБ."}';
    }

    # 🔹 Прокси на Node backend внутри Docker Compose
    location /api/daily-games {
        proxy_pass http://backend:3000/api/daily-games;   # имя сервиса из docker-compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/game-comments/ {
        proxy_pass http://backend:3000/api/game-comments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/game-comments {
        proxy_pass http://backend:3000/api/game-comments;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/profile-notifications {
        proxy_pass http://backend:3000/api/profile-notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/profile-follows {
        proxy_pass http://backend:3000/api/profile-follows;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/news-articles {
        proxy_pass http://backend:3000/api/news-articles;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/news-article-comments {
        proxy_pass http://backend:3000/api/news-article-comments;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/news-slider {
        proxy_pass http://backend:3000/api/news-slider;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/profile-liked-news {
        proxy_pass http://backend:3000/api/profile-liked-news;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/profile-news-notifications {
        proxy_pass http://backend:3000/api/profile-news-notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/profiles {
        proxy_pass http://backend:3000/api/profiles;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🔹 Прокси на внешний API с кешем
    location /api/external/ {
        proxy_cache NBA_CACHE;
        proxy_cache_valid 200 30m;              # кешируем успешные ответы 30 минут
        proxy_cache_use_stale error timeout updating;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass https://api.balldontlie.io/v1/;  # обязательно слэш
        proxy_ssl_server_name on;

        # 🔹 API ключ добавляется к каждому запросу
        include /etc/nginx/headers.conf;
        proxy_set_header Host api.balldontlie.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🔹 SPA fallback
    location / {
        try_files $uri /index.html;
    }

    location /api/standings/ {
        proxy_pass http://backend:3000/api/standings/;
    }

    location /api/player-stats/ {
        proxy_pass http://backend:3000/api/player-stats/;
    }

    location /api/player-gamelog/ {
            proxy_pass http://backend:3000/api/player-gamelog/;
    }

    location /api/player-career/ {
            proxy_pass http://backend:3000/api/player-career/;
    }

    location /api/players/search {
            proxy_pass http://backend:3000/api/players/search;
    }

    location /api/team-games/ {
                proxy_pass http://backend:3000/api/team-games/;
    }

    location /api/team-upcoming-games/ {
                    proxy_pass http://backend:3000/api/team-upcoming-games/;
    }

    location /api/game-detail/ {
        proxy_pass http://backend:3000/api/game-detail/;
    }

    location /api/game-recap/ {
        proxy_pass http://backend:3000/api/game-recap/;
    }

    location /api/game-broadcast/ {
        proxy_pass http://backend:3000/api/game-broadcast/;
    }

    location /api/translate {
        proxy_pass http://backend:3000/api/translate;
    }

    location /api/games/by-date/ {
        proxy_pass http://backend:3000/api/games/by-date/;
    }

    location /api/player-image/ {

        proxy_pass http://backend:3000/api/player-image/;

        proxy_cache PLAYER_IMG_CACHE;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout updating;

        proxy_cache_key "$scheme$request_method$host$request_uri";

        proxy_buffering on;

        proxy_ignore_headers Cache-Control;
        proxy_hide_header Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/game-boxscore-v3/ {
        proxy_pass http://backend:3000/api/game-boxscore-v3/;
    }

    location /api/current-season {
            proxy_pass http://backend:3000/api/current-season;
    }

    location /api/playoffs/ {
         proxy_pass http://backend:3000/api/playoffs/;
    }
}
